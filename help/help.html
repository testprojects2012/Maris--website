<style>
a:link {
  color: green;
  text-decoration: none; /* Removes underline */
  transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);
    filter: drop-shadow(0px 2px 3px rgb(0,0,0));
}

/* Visited link */
a:visited {
  color: rgb(228, 109, 228);
  text-decoration: none;
    filter: drop-shadow(0px 2px 3px rgb(0,0,0));
}

/* Mouse over link */
a:hover {
  margin-top: -5px;
  color: rgb(177, 1, 89); /* Changes color on hover */
  text-decoration: none; /* Adds underline on hover */
  filter: drop-shadow(0px 5px 3px rgb(0,0,0));
}

/* Selected link */
a:active {
    color: rgb(150, 0, 75); /* Changes color on hover */
  translate: 0px 2px;
}


    body {

        background-blend-mode:saturation;
        background-color: rgb(184, 0, 0);
        background-image:url(grid.gif);
        background-size:3cm;
        filter:drop-shadow(0 10px 10px 2px rgb(0,0,0));
                font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

p {

    font-size: 25px;
    color: #ffffff;
    font-family: "Rockwell Extra Bold", "Rockwell Bold", monospace; font-style: normal; font-variant: normal; font-weight: 700; line-height: 26.4px;
    filter: drop-shadow(3px 3px 0.5px rgb(0, 0, 0));
}
.box-top {
  position: absolute;
  right: 5%;
  width: 91.5%;
  height: 60px;
  background-color: #000000;
  border: 2px solid #ccc;
  border-radius: 15px;
}
.scroll-box {
    background-color: rgb(38, 0, 255);
    background-image: url(grid.gif);
    background-blend-mode: saturation;
    width: 90%;
    height: 80%; 
    border: 1px solid #4c0000;
    padding: 10px;
    overflow: auto;
    position: absolute;
    right: 5%;
    top: 6%;
    filter: drop-shadow(10px 10px 5px rgb(0,0,0));
    border-radius: 15px;
}

::-webkit-scrollbar {
  width: 30px; /* width of the vertical scrollbar */
  background-color: transparent
}

::-webkit-scrollbar-track {
  background-color: rgb(0, 0, 0); /* color of the tracking area */
  border-radius: 20px;
}

::-webkit-scrollbar-thumb {
  background-color: rgb(164, 0, 0); /* color of the scroll thumb */
  border-radius: 30px; /* roundness of the scroll thumb */
  border: 5px solid red
}


</style>
