<style>
    /* fonts */
    @font-face {
      font-family: fonttest;
      src: url("MAIN/gaslight.ttf");}
.gearmove {
  animation: gearmove 3s infinite linear;
}
    /* animations */
    @keyframes gearmove {
      0% {transform: rotate(0deg);}
      100% {transform:rotate(360deg);}}
    @keyframes FADE {
      0%,100% { opacity: 1; }
      50% { opacity: .7; }}
    @keyframes textwave {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }}
    @keyframes asdasd {
      0%, 100% {transform: translateY(0) rotate(-5deg);}
      50% {transform: translateY(-10px) rotate(5deg); }}
    @keyframes sway {
      0% { transform: rotate(-5deg)}
      10% { transform: rotate(4deg);}
      20% { transform: rotate(-3deg);}
      30% { transform: rotate(2deg);}
      40% { transform: rotate(-1deg);}
      50% { transform: rotate(.8deg);}
      60% { transform: rotate(-.6deg);}
      70% { transform: rotate(.5deg);}
      80% { transform: rotate(-.3deg);}
      90% { transform: rotate(.1deg);}
      100% { transform: rotate(0deg);}}
    @keyframes arrow {
      0%,100% {transform: rotate(50deg) translateY(20px);}
      50% {transform: rotate(30deg) translateY(0px);}}
    .swaying-image {
      height:40%;
      filter: drop-shadow(10px 10px 3px rgba(0, 0, 0, 0.8));}

    .swaying-image:hover {
      animation: sway 1s 1 cubic-bezier(0.77, 0, 0.175, 2);
      filter: drop-shadow(20px 20px 3px rgba(0, 0, 0, 0.5));}

    .animation {
      animation: FADE 2s infinite cubic-bezier(0.165, 0.1, 0.165, 1);}
    /* scrollbar */
    ::-webkit-scrollbar {
      width: 30px;
      background-color: transparent}
    ::-webkit-scrollbar-track {
      background-color: rgb(0, 0, 0);
      border-radius: 20px;}
    ::-webkit-scrollbar-thumb {
      background-color: rgb(164, 0, 0); 
      border-radius: 30px;
      border: 5px solid red}
    html {
      background: linear-gradient(to top, #eb366c, #f5799e),url(MAIN/grid.gif);
      background-blend-mode: multiply;
      background-size: 24cm;
      background-attachment:fixed;
      font-family: fonttest;}

    header {
      scroll-margin: 0;
      background: linear-gradient(to top, #433188, #4f3e92);
      color: rgb(255, 255, 255);
      padding: 5px;
      text-align: center;
      border: 5px solid #36296b;}

    .wavy-text-container span {
      display: inline-block;
      animation: asdasd 1.5s ease-in-out 0 infinite;}
</style>
