<style>
@font-face {
    font-family: fonttest;

@keyframes sway {
    0% { transform: rotate(-5deg)}
  10% { transform: rotate(4deg);}
  20% { transform: rotate(-3deg); }
  30% { transform: rotate(2deg); }
  40% { transform: rotate(-1deg); }
  50% { transform: rotate(.8deg); }
  60% { transform: rotate(-.6deg); }
  70% { transform: rotate(.5deg); }
  80% { transform: rotate(-.3deg); }
  90% { transform: rotate(.1deg); }
  100% { transform: rotate(0deg); }}
::-webkit-progress-bar {
-ms-progress-appearance: bar;}
.swaying-image:hover {
  animation: sway 1s 1 cubic-bezier(0.77, 0, 0.175, 2)}
.dropshadow {

.nav {

@keyframes FADE {
    0% { opacity: 1; }
  50% { opacity: .7; }
  100% { opacity: 1; }}

@keyframes textwave {
    0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }}


.animation {
    animation: FADE 2s infinite cubic-bezier(0.165, 0.1, 0.165, 1);
}

.wavy-text-container span {
    display: inline-block; animation: "asdasd";
    animation-duration: 1.5s; 
    animation-timing-function: ease-in-out;

}

@keyframes asdasd {
    0%, 100% {
        transform: translateY(0) rotate(-5deg);}
    50% {
