<style>
@keyframes startup {
  0% {width: 0%;right: 50%;}
    100% {width: 90%;right: 5%;}}
@keyframes startup-top {
  0% {width: 0%;right: 50%;}
    100% {width: 91.55%;right: 5%;}}
.startup-top {
  animation: startup-top 1s  cubic-bezier(0.148, 0.84, 0.44, 1);}
.startup {
  animation: startup 1s cubic-bezier(0.165, 0.84, 0.44, 1);}
a:link {
  color: rgb(255, 255, 255);
  text-decoration: none;
    filter: drop-shadow(0px 2px 3px rgb(0,0,0));
  transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);}
a:visited {
  color: rgb(228, 109, 228);
  text-decoration: none;
    filter: drop-shadow(0px 2px 3px rgb(0,0,0));
  transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);}
a:hover {
  margin-top: -5px;
  color: rgb(177, 1, 89); 
  text-decoration: none;
  filter: drop-shadow(0px 5px 3px rgb(0,0,0));
  transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);}
a:active {
    color: rgb(150, 0, 75);
  translate: 0px 2px;
  transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);}
body {
  background-blend-mode:saturation;
  background-color: rgb(184, 0, 0);
  background-image:url(grid.gif);
  background-size:3cm;
  filter:drop-shadow(0 10px 10px 2px rgb(0,0,0));
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;}
p {
    font-size: 25px;
    color: #ffffff;
    font-family: "Rockwell Extra Bold", "Rockwell Bold", monospace; font-style: normal; font-variant: normal; font-weight: 700; line-height: 26.4px;
    filter: drop-shadow(3px 3px 1px rgb(0, 0, 0));}
.box-top {
  position: absolute;
  right: 5%;
  top: 1.5%;
  width: 91.55%;
  height: 60px;
  background-color: #000000;
  border: 2px solid #ccc;
  border-radius: 15px 15px 0px 0px;}
.scroll-box {
    background-color: rgb(51, 31, 166);
    background-image: url(grid.gif);
    background-clip:border-box;
    background-blend-mode: color-burn;
    width: 90%;
    height: 75%; 
    border: 1px solid #4c0000;
    padding: 10px;
    overflow:auto;
    overflow-x: hidden;
    position: absolute;
    right: 5%;
    top: 10.3%;
    filter: drop-shadow(10px 10px 5px rgb(0,0,0));
    border-radius: 0px 0px 15px 15px;
    border: 2px solid  white;}
::-webkit-scrollbar {
  width: 25px;
  background-color: transparent;
  background-clip:content-box;}
::-webkit-scrollbar-track {
  border-radius: 10px;
  background-color: rgba(0, 0, 0)}
::-webkit-scrollbar-thumb {
  background-clip:content-box;
  background-color: rgb(164, 0, 0);
  border-radius: 10px;
  border: 5px solid red;
}

  @keyframes fadeaway {  0% {opacity: 1;}  50% {opacity: 1;}  100% {opacity: 0;}} 
.blackfade {  animation: fadeaway 2s cubic-bezier(0.165, 0.84, 0.44, 1);}
</style>

</div>
