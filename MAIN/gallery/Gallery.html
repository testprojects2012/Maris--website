    <title>Gallery</title>
    <link rel="icon" type="x-icon" href="icon.svg">

<style>
:root {
  --dropshadowcol1:#00046d;
  --darkermaincolor:#3b394b;
  --bordercolor:#a897a7;
  --maincolor:#2f2930;
  --text-shadow: -2px -2px 0 #36296b,2px -2px 0 #36296b,-2px 2px 0 #36296b,2px 2px 0 #36296b;}
html {
  scroll-behavior:smooth;
 background: linear-gradient(to top, #ff1515, #ff4848), url(../grid.gif);  background-blend-mode: multiply;background-size: 12cm;background-attachment:fixed;
  font-family: Arial, sans-serif;
  a:link {color: rgb(234, 75, 75);text-decoration: none; transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);filter: drop-shadow(0px 2px 3px rgb(0,0,0));}a:visited {color: rgb(160, 50, 50);text-decoration: none;filter: drop-shadow(0px 2px 3px rgb(0,0,0));}a:hover {margin-top: -5px;color: rgb(255, 153, 204); text-decoration: none;filter: drop-shadow(0px 5px 3px rgb(0,0,0));}a:active {color: rgb(85, 35, 60); translate: 0px 2px;}}
@font-face {
    font-family: fonttest;
    src: url("../gaslight.ttf");}
.galleryimage {
  height: 75%;
  padding: 20px;transform: scale(1);
  transition:  0.5s linear(0, 0.264 3.7%, 0.49 7.4%, 0.692 11.3%, 0.864 15.3%, 0.937 17.3%, 1.005 19.4%, 1.065 21.5%, 1.12 23.7%, 1.167 25.9%, 1.206 28.1%, 1.24 30.4%, 1.267 32.8%, 1.283 34.6%, 1.296 36.4%, 1.305 38.3%, 1.311 40.2%, 1.314 42.2%, 1.313 44.2%, 1.309 46.4%, 1.301 48.6%, 1.282 52.5%, 1.252 56.9%, 1.217 61.3%, 1.105 74.4%, 1.074 78.6%, 1.048 82.5%, 1.026 86.9%, 1.011 91.1%, 1.002 95.4%, 1);}
.galleryimage:hover {transform: scale(1.2);}
.galleryimage img {border-radius: 10px;}
header {  
  position: fixed;
  text-shadow:var(--text-shadow);
  background-color: var(--darkermaincolor);
  color: rgb(255, 255, 255);
  margin: 10px;padding: 30px;
  text-align: left;
  border: 5px solid var(--bordercolor);border-radius: 15px;
  translate: 0px -10px;z-index: 9999;
  transition: .5s cubic-bezier(0.075, 0.82, 0.165, 1);}
header:hover { scale: 1.05;}
/* scroll bar */
::-webkit-scrollbar {width: 20px;background-color: transparent;}
::-webkit-scrollbar-track {background-color: rgb(0, 0, 0);border-radius: 10px;}
::-webkit-scrollbar-thumb {background-color: rgb(164, 0, 0); border-radius: 10px;border: 5px solid red}
.BOXHERE {
  transform: scale(1);
  width: 90%;
  margin: 2.5%;
  background-color: var(--bordercolor);border: 5px solid var(--darkermaincolor);
  filter: drop-shadow(0px 0px 15px var(--dropshadowcol1));
  border-radius: 10px;
    transition:  0.5s cubic-bezier(0.34, 1.56, 0.64, 1);}
.BOXHERE:hover {transform: scale(1.01);}
.BOXHERE img {
  border-radius: 30px;
  margin: 80px;padding: 5px;
  align-self: center;
  background-color: #2f2930;
  width: 20em;scale: 1.2;
  transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);}
.BOXHERE img:hover {transform: scale(1.1)}
</style>
<header style="font-size: 45px; font-family: fonttest; ;">
  <a style="color: white; text-decoration: none;" href="../../index.html"> main page</a>
</header>
