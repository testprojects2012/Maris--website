<style>
  @keyframes headerappear {
    0% {
      transform: translateY(-300px) rotateZ(360deg)}
    100% {
      transform: translateY(0px) rotateZ(0deg);}}



  :root {
    --dropshadowcol1: rgb(170, 170, 170);
    --darkermaincolor: rgb(170, 170, 170);
    --maincolor: rgb(170, 170, 170);
    --bordercolor: rgb(54, 22, 22);
    --color: invert(40%) sepia(400%) hue-rotate(320deg) saturate(199.90967741935484%) brightness(130%);
    --text-shadow: -2px -2px 0 var(--darkermaincolor), 2px -2px 0 var(--darkermaincolor), -2px 2px 0 var(--darkermaincolor), 2px 2px 0 var(--darkermaincolor);
    --dropcolor: rgb(170, 170, 170);}

  .page {
    display: none;}

  .page:target {
    display: block;}

  .box-container {
    padding: 20px;
    background-color: var(--maincolor);
    width: 95%;
    height: 10%;
    border: 5px solid var(--bordercolor);
    border-radius: 10px;}

  @keyframes spinny {
    0%,100% {
      text-shadow: -2px -2px 0 #dc2553;
    }

    25% {
      text-shadow: 2px -2px 0 #dc2553;
    }

    50% {
      text-shadow: 2px 2px 0 #dc2553;
    }

    75% {
      text-shadow: -2px 2px 0 #dc2553;
    }
  }

  @keyframes charmove {

    0%,
    100% {
      transform: translateY(5px)
    }

    50% {
      transform: translateY(0px)
    }
  }

  @keyframes hovertilt {

    0%,
    100% {
      rotate: 5deg;
    }

    50% {
      rotate: -5deg;
    }
  }

  @keyframes backarrowsway {

    0%,
    100% {
      translate: 0px 5px;
    }

    50% {
      translate: 0px 0px;
    }
  }

  .charmove {
    animation: 2s charmove cubic-bezier(0.36, 0, 0.64, 1) infinite;
  }

  @font-face {
    font-family: test;
    src: url(BingBam.otf);
  }


  .gallery {
    overflow-x: hidden;
    overflow-y: scroll;
    padding: 10px;
    background: linear-gradient(to bottom, var(--dropcolor), var(--darkermaincolor)), url(../../grid.gif);
    background-blend-mode: multiply;
    background-size: 50vw;
    width: 90%;
    height: 90%;
    border: 5px solid var(--bordercolor);
    border-radius: 20px;
  }

  .galleryimg {
    padding: 5px;
    translate: 0 40px;
    margin: 20px;
    border: 5px solid var(--bordercolor);
    border-radius: 15px;
    overflow: hidden;
    background: linear-gradient(to top, #ff0000, #7b0000), url(../../grid.gif);
    background-blend-mode: multiply;
    background-size: 50vw;
    height: 40%;
    transition: .25s linear(0, 0.002 0.7%, 0.009 1.4%, 0.019 2.1%, 0.032 2.8%, 0.049 3.5%, 0.072 4.3%, 0.098 5.1%, 0.131 6%, 0.193 7.5%, 0.265 9.1%, 0.554 15%, 0.675 17.6%, 0.736 19%, 0.789 20.3%, 0.838 21.6%, 0.88 22.8%, 0.918 24%, 0.953 25.2%, 0.984 26.4%, 1.014 27.7%, 1.04 29%, 1.062 30.3%, 1.08 31.6%, 1.094 32.9%, 1.112 35%, 1.121 37.2%, 1.125 39.6%, 1.121 42.2%, 1.113 44.3%, 1.102 46.7%, 1.044 56.4%, 1.019 61.2%, 1.001 66.3%, 0.989 71.5%, 0.985 76%, 0.985 81.1%, 1);
  }

  .galleryimg:hover {
    scale: 1.3;
    z-index: 99999999999;
    padding: 10px;
  }

  .galleryimg img {
    transition: 0.25s linear(0, 0.002 0.7%, 0.009 1.4%, 0.019 2.1%, 0.032 2.8%, 0.049 3.5%, 0.072 4.3%, 0.098 5.1%, 0.131 6%, 0.193 7.5%, 0.265 9.1%, 0.554 15%, 0.675 17.6%, 0.736 19%, 0.789 20.3%, 0.838 21.6%, 0.88 22.8%, 0.918 24%, 0.953 25.2%, 0.984 26.4%, 1.014 27.7%, 1.04 29%, 1.062 30.3%, 1.08 31.6%, 1.094 32.9%, 1.112 35%, 1.121 37.2%, 1.125 39.6%, 1.121 42.2%, 1.113 44.3%, 1.102 46.7%, 1.044 56.4%, 1.019 61.2%, 1.001 66.3%, 0.989 71.5%, 0.985 76%, 0.985 81.1%, 1);
  }

  /* char things*/

  .MoonyBox {
    position: absolute;
    width: 30%;
    height: 60%;
    background: linear-gradient(to bottom, var(--dropcolor), var(--darkermaincolor)), url(../../grid.gif);
    background-blend-mode: multiply;
    border: 5px solid var(--bordercolor);
    padding: 2vw;
    filter: drop-shadow(0px 0px 15px var(--dropshadowcol1));
    overflow: hidden;
    translate: 40px 100px;
    border-radius: 2vw;
    z-index: 1;
    transition: .5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .MoonyBox:hover {
    filter: drop-shadow(0px 0px 30px var(--dropshadowcol2));
    border-radius: 4vw;
    width: 65%;
    height: 145%;
    z-index: 999;
  }

  .MoonyBox:hover img {
    translate: 50% 1vw;
  }

  .heightline {
    background-color: red;
    padding-right: 5%;
    height: 3px;
    width: 300px;
    border: solid 2px darkred;
  }

  .funfactbox {
    background-color: var(--maincolor);
    border: 5px solid var(--bordercolor);
    padding: 10px;
    filter: drop-shadow(0px 0px 15px var(--dropcolor));
    border-radius: 10px 10px 10px 10px;
    width: 90%;
  }

  .BOXHERE {
    background-color: var(--maincolor);
    border: 5px solid var(--bordercolor);
    padding: 10px;
    filter: drop-shadow(0px 0px 15px var(--dropcolor));
    border-radius: 10px 10px 10px 10px;
  }

  a:link {
    color: rgb(234, 75, 75);
    text-decoration: none;
    transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);
    filter: drop-shadow(0px 2px 3px rgb(0, 0, 0));
  }

  a:visited {
    color: rgb(160, 50, 50);
    text-decoration: none;
    filter: drop-shadow(0px 2px 3px rgb(0, 0, 0));
  }

  a:hover {
    margin-top: -5px;
    color: rgb(255, 153, 204);
    text-decoration: none;
    filter: drop-shadow(0px 5px 3px rgb(0, 0, 0));
  }

  a:active {
    color: rgb(85, 35, 60);
    translate: 0px 2px;
  }

  /* general page things*/
  .coolhighlight {
    margin-top: 20px;
    filter: drop-shadow(0 0 -2px #fbfbfb);
    transition: cubic-bezier(0.075, 0.82, 0.165, 1) .5s;
  }

  .coolhighlight:hover {
    translate: 0px -10px;
    filter: drop-shadow(0 0 10px #fbfbfb);
  }

  .CharCenter {
    display: block;
    margin-left: 3%;
    margin-right: auto;
  }

  .button1 {
    z-index: 99999;
    opacity: 1;
    width: 55px;
    height: 55px;
    background-color: var(--maincolor);
    border: 5px solid var(--bordercolor);
    border-radius: 15px;
    padding: 10px;
    margin: 1px;
    font-size: 20px;
    animation: backarrowsway2 1.5s ease-in-out infinite;
    transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);
  }

  .button1 img {
    animation: backarrowsway 1.5s ease-in-out infinite;
  }

  .button1:hover img {
    animation: hovertilt 1s ease-in-out infinite;
  }

  .button1:hover {
    opacity: 0.7;
    translate: 2px;
    scale: 1.2;
    font-size: 25px;
  }

  .my-box {
    width: 80px;
    height: 20px;
    background-color: #ff3366;
    border: 5px solid #e42555;
    border-radius: 15px;
    padding: 10px;
    margin-bottom: 5px;
  }

  .boxtween {
    font-size: 18px;
    scale: 1;
    border: 5px solid #e42555;
    transition: .5s cubic-bezier(.1, 1.1, .25, 1.38)
  }

  .boxtween:hover {
    scale: 1.2;
    border: 7px solid #e42555;
  }

  .boxtween:hover img {
    scale: 1.6;
  }

  .boxtween img {
    transition: .5s cubic-bezier(.1, 1.1, .25, 1.38);
  }

  .textbounce {
    font-size: 48px;
    transition: .25s cubic-bezier(.1, 1.1, .25, 1.38)
  }

  .textbounce:hover {
    font-size: 54px;
  }

  .container {
    width: 300px;
    height: 150px;
    border: 2px solid #ffffff;
    margin: auto;
    overflow-x: scroll;
    overflow-y: scroll;
  }

  ::-webkit-scrollbar {
    width: 20px;
    background-color: transparent;
  }

  ::-webkit-scrollbar-track {
    background-color: rgb(0, 0, 0);
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb {
    background-color: rgb(164, 0, 0);
    border-radius: 10px;
    border: 5px solid red
  }

  .center-img {
    margin-top: 200px;
    height: 185%;
  }

  .testeffect {
    translate: 0px 0px;
    filter:
      drop-shadow(0 0px -0.9px rgb(255, 255, 255)) drop-shadow(0 0px 0px rgb(174, 46, 46));
    transition: 1s cubic-bezier(.1, 1.1, .25, 1.38);
  }

  .testeffect:hover {
    transform: scale(250%);
    translate: 0px -15px;
    filter:
      drop-shadow(0 0px 4px rgb(255, 255, 255)) drop-shadow(0 15px 1px rgb(174, 46, 46));
  }

  .outlined-text {
    font-size: 48px;
    color: white;
    animation: spinny infinite 2s linear(0, 0.013 1%, 0.051 2.2%, 0.404 9.8%, 0.51 12.6%, 0.602 15.5%, 0.683 18.7%, 0.754 22.2%, 0.813 26%, 0.861 30.2%, 0.9 34.8%, 0.931 40%, 0.972 52.7%, 0.992 70.2%, 1);
    transition: .5s cubic-bezier(.1, 1.1, .25, 1.38)
  }

  .outlined-text:hover {
    text-shadow:
      -2.5px -2.5px 0 #e42555,
      2.5px -2.5px 0 #e42555,
      -2.5px 2.5px 0 #e42555,
      2.5px 2.5px 0 #e42555;
  }

  html {
    scroll-behavior: smooth;
    background: linear-gradient(to top, var(--maincolor), var(--bordercolor)), url(../../grid.gif);
    background-repeat: repeat;
    background-blend-mode: multiply;
    background-size: 36cm;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  header {
    animation: headerappear 1s cubic-bezier(0, 1.314, 0.64, 1) 1;

    opacity: 100%;
    position: fixed;
    text-shadow: var(--text-shadow);
    background-color: #4f3e92;
    color: rgb(255, 255, 255);
    padding: 30px;
    text-align: left;
    border: 5px solid #36296b;
    border-radius: 15px;
    z-index: 9999;
    translate: 0px 5px;
    transition: .5s cubic-bezier(0.075, 0.82, 0.165, 1);
  }

  header:hover {
    opacity: 50%;
    translate: 0px -10px;
  }
</style>
