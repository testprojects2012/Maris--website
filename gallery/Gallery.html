<style>
@keyframes sway {

  0% { transform: rotate(0deg); }
  25% {transform: rotate(-15deg)}
  50% { transform: rotate(0deg); }
  75% { transform: rotate(15deg); }
    100% {transform: rotate(0deg);}
}

.swaying-image:hover {
  animation: sway 1s infinite step-end
}

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
                background-blend-mode:saturation;
        background-color: rgb(184, 0, 0);
        background-image:url(grid.gif);
        background-size:3cm;
    }

    h2 {
    border:#67071f double 5px;
    background-image: linear-gradient(rgb(181, 36, 36), rgb(122, 21, 21));
    }
.button1 {
    width: 150px; /* Sets the width of the content area */
    height: 30px; /* Sets the height of the content area */
    background-color: #ff3366; /* Fills the box with a color */
    border: 5px solid #e42555;
    border-radius: 15px; /* Adjust the pixel value for more or less roundness */    
    padding: 10px; /* Adds space between the content and border */
    font-size: 30px;
    margin: 1px; /* Adds space outside the border, between this box and others */
    transition: 0.2s cubic-bezier(0.075, 0.82, 0.165, 1);
}

.button1:hover {
    font-size: 40px;
    width: 190px; /* Sets the width of the content area */
    height: 40px;
}

.galleryimage {
    height: 30%;
    padding: 20px;
    transition: height 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);
}

.galleryimage:hover {
    height: 35%;
}



    .text {
  font-size: 45px;
  transition: font-size 0.3s cubic-bezier(0.075, 0.82, 0.165, 1); /* Smooth transition */
}

.text:hover {
  font-size: 55px; /* Size on hover */
}

    header {
        background-color: #df5656;
        color: rgb(101, 16, 16);
        padding: 20px;
        text-align: center;
    }

    nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    nav ul li {
        display: inline;
        margin-right: 20px;
    }

    nav ul li a {
        color: rgb(255, 151, 151);
        text-decoration: none;
    }

    nav ul li a:hover {
        text-decoration: underline;

    }



::-webkit-scrollbar {
  width: 30px; /* width of the vertical scrollbar */
  background-color: transparent
}

::-webkit-scrollbar-track {
  background-color: rgb(100, 40, 40); 
  background-image: linear-gradient(rgb(100, 20,0), rgb(100,40,40));
  border-radius: 20px;
  border: #4a0a1a solid 5px;
}

::-webkit-scrollbar-thumb {
  background-color: rgb(164, 0, 0); /* color of the scroll thumb */
  background-image: linear-gradient(red, rgb(255, 86, 86));

  border-radius: 30px; /* roundness of the scroll thumb */
  border: 5px solid rgb(151, 0, 0)
}
</style>


<header class="text" >Gallery</header>
