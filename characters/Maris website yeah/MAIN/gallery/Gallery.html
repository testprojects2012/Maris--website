<style>
    a:link {
  color: green;
  text-decoration: none; 
  transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);
    filter: drop-shadow(0px 2px 3px rgb(0,0,0));}
a:visited {
  color: rgb(228, 109, 228);
  text-decoration: none;
    filter: drop-shadow(0px 2px 3px rgb(0,0,0));}
a:hover {
  margin-top: -5px;
  color: rgb(177, 1, 89); 
  text-decoration: none; 
  filter: drop-shadow(0px 5px 3px rgb(0,0,0));}
a:active {
    color: rgb(150, 0, 75); 
  translate: 0px 2px;}
.menu {
  list-style: none;
  padding: 0;}
.menu li {
  position: relative;
  display: inline-block;
  transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1);}
.submenu {
  position: absolute;
  top: 100%;
  left: 0;
  background: #fff;
  list-style: none;
  padding: 0;
  margin: 0;
  display: none;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  z-index: 1000;}
.menu li:hover .submenu {
  display: block;}
.submenu a {
  display: block;
  padding: 8px 16px;
  text-decoration: none;
  color: #333;}
.submenu a:hover {
  background: #f0f0f0;}
@font-face {
    font-family: fonttest;
    src: url("../gaslight.ttf");}
@keyframes sway {
  0% { transform: rotate(0deg); }
  25% {transform: rotate(-15deg)}
  50% { transform: rotate(0deg); }
  75% { transform: rotate(15deg); }
    100% {transform: rotate(0deg);}}
.swaying-image:hover {
  animation: sway 1.5s infinite cubic-bezier(.2, .4,.6, 1);}
body {
  background-blend-mode: multiply;
  background-color: rgb(184, 0, 0);
  background-image:url(grid.gif);
  background-size:3cm;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;}
    h2 {
    border:#67071f double 5px;
    background-image: linear-gradient(rgb(181, 36, 36), rgb(122, 21, 21));}
.button1 {
  width: 200px; 
  height: 60px;
  background-color:  rgb(96, 30, 196); 
  border: 5px solid rgb(70, 14, 153);
  border-radius: 15px; 
  padding: 10px;
  font-size: 30px;
  margin: 1px;
  transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);}
.button1:hover {
  font-size: 39px;
  width: 210px; 
  height: 70px;}
.galleryimage {
    height: 50%;
    padding: 20px;
    transition: height 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);}
.galleryimage:hover {
    height: 55%;}
.text {
  font-size: 45px;
  transition: font-size 0.3s cubic-bezier(0.075, 0.82, 0.165, 1);}
.text:hover {
  font-size: 50px;}
header {
        background-color: #4f3e92;
        color: rgb(255, 255, 255);
        padding: 30px;
        text-align: center;
        border: 5px solid #36296b;}
nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;}
nav ul li {
        display: inline;
        margin-right: 20px;}
nav ul li a {
        color: rgb(255, 151, 151);
        text-decoration: none;}
nav ul li a:hover {
        text-decoration: underline;}
.tooltip-container {
  position: relative;
  display: inline-block;}
.tooltip-text {
  visibility: hidden;
  opacity: 0;
  position: absolute;
  bottom: -200%;
  left: 50%;
  transform: translateX(-50%);
  background-color: #df8989;
  color: #b12525;
  padding: 5px 10px;
  border-radius: 4px;
  white-space: nowrap;
  transition: opacity 0.6s cubic-bezier(0.075, 0.82, 0.165, 1);
  z-index: 10;
  outline: 5px solid red;
  filter: drop-shadow(0px 0px 5px rgb(87, 4, 4));}
.tooltip-container:hover .tooltip-text {
  visibility: visible;
  opacity: 1;}   
::-webkit-scrollbar {
  width: 30px;  
  background-color: transparent}
::-webkit-scrollbar-track {
  background-color: rgb(100, 40, 40); 
  background-image: linear-gradient(rgb(100, 20,0), rgb(100,40,40));
  border-radius: 20px;
  border: #4a0a1a solid 5px;}
::-webkit-scrollbar-thumb {
  background-color: rgb(164, 0, 0); 
  background-image: linear-gradient(red, rgb(255, 86, 86));
  border-radius: 30px; 
  border: 5px solid rgb(151, 0, 0)}
.boxingers {
background-color: #67071f;
outline: solid 5px  #4a0a1a;
border-radius: 14px;}
h1 {
color: white;
filter: drop-shadow(5px 5px 5px rgb(162, 162, 162));}
